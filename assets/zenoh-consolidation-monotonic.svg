<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 300" role="img" aria-labelledby="cm-t cm-d">
  <title id="cm-t">Consolidation Monotonic</title>
  <desc id="cm-d">With consolidation Monotonic replies are delivered as they arrive, but a value older than one already delivered for the same key is dropped.</desc>
  <style>
    .h{font:700 17px Inter,Arial,sans-serif;fill:#0b1641}
    .lab{font:700 12px Inter,Arial,sans-serif;fill:#5b6b86}
    .op{font:600 12px Inter,Arial,sans-serif;fill:#c47f12}
    .leg{font:11px Inter,Arial,sans-serif;fill:#8a98ad}
    .k{font:700 16px Inter,Arial,sans-serif;fill:#fff}
    .v{font:11px Inter,Arial,sans-serif;fill:#eef7ff}
    .drop{font:700 9px Inter,Arial,sans-serif;fill:#e2574c}
    .x{stroke:#e2574c;stroke-width:3;stroke-linecap:round}
  </style>

  <text class="h" x="190" y="22" text-anchor="middle">Monotonic</text>

  <!-- arriving -->
  <text class="lab" x="18" y="48">Replies arriving &#8594;</text>
  <g><rect x="18" y="56" width="62" height="46" rx="8" fill="#2f8fd6"/><text class="k" x="49" y="77" text-anchor="middle">A</text><text class="v" x="49" y="94" text-anchor="middle">v2</text></g>
  <g><rect x="88" y="56" width="62" height="46" rx="8" fill="#3fae9b"/><text class="k" x="119" y="77" text-anchor="middle">B</text><text class="v" x="119" y="94" text-anchor="middle">v1</text></g>
  <g opacity=".4"><rect x="158" y="56" width="62" height="46" rx="8" fill="#2f8fd6"/><text class="k" x="189" y="77" text-anchor="middle">A</text><text class="v" x="189" y="94" text-anchor="middle">v1</text></g>
  <line class="x" x1="162" y1="60" x2="216" y2="98"/>
  <line class="x" x1="216" y1="60" x2="162" y2="98"/>
  <text class="drop" x="189" y="114" text-anchor="middle">stale &#8594; dropped</text>
  <g><rect x="228" y="56" width="62" height="46" rx="8" fill="#2f8fd6"/><text class="k" x="259" y="77" text-anchor="middle">A</text><text class="v" x="259" y="94" text-anchor="middle">v3</text></g>
  <g><rect x="298" y="56" width="62" height="46" rx="8" fill="#3fae9b"/><text class="k" x="329" y="77" text-anchor="middle">B</text><text class="v" x="329" y="94" text-anchor="middle">v2</text></g>

  <!-- flow -->
  <path d="M183 120 L183 130 L176 130 L190 142 L204 130 L197 130 L197 120 Z" fill="#f5aa00" opacity=".9"/>
  <text class="op" x="190" y="162" text-anchor="middle">drop values older than the last seen</text>

  <!-- delivered -->
  <text class="lab" x="18" y="186">Delivered to app</text>
  <g><rect x="18" y="192" width="62" height="46" rx="8" fill="#2f8fd6"/><text class="k" x="49" y="213" text-anchor="middle">A</text><text class="v" x="49" y="230" text-anchor="middle">v2</text></g>
  <g><rect x="88" y="192" width="62" height="46" rx="8" fill="#3fae9b"/><text class="k" x="119" y="213" text-anchor="middle">B</text><text class="v" x="119" y="230" text-anchor="middle">v1</text></g>
  <g><rect x="158" y="192" width="62" height="46" rx="8" fill="#2f8fd6"/><text class="k" x="189" y="213" text-anchor="middle">A</text><text class="v" x="189" y="230" text-anchor="middle">v3</text></g>
  <g><rect x="228" y="192" width="62" height="46" rx="8" fill="#3fae9b"/><text class="k" x="259" y="213" text-anchor="middle">B</text><text class="v" x="259" y="230" text-anchor="middle">v2</text></g>

  <text class="leg" x="190" y="262" text-anchor="middle">A, B = keys &#160;&#183;&#160; v1 &lt; v2 &lt; v3 = value versions</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -23 60 46" role="img" aria-labelledby="node-title node-desc">
  <title id="node-title">Zenoh node icon</title>
  <desc id="node-desc">A reusable blue Zenoh network node used to route data in topology animations.</desc>
  <defs>
    <linearGradient id="node-fill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#62bfff"/>
      <stop offset="1" stop-color="#247fbd"/>
    </linearGradient>
  </defs>
  <g id="node">
    <path d="M-24,-8 v16 c0,6 11,11 24,11s24,-5 24,-11V-8" fill="url(#node-fill)"/>
    <ellipse cx="0" cy="-8" rx="24" ry="10" fill="#61bdf5"/>
    <path d="M -24,-8 A 24 10 0 0 1 24,-8 V 8 A 24 10 0 0 1 -24,8 Z" fill="none" stroke="#072f61" stroke-width="3" stroke-linejoin="round"/>
    <g transform="translate(0, -8) scale(1, 0.42)">
      <!-- Inward pointing arrows -->
      <polygon points="-16,-2.5 -7,-2.5 -7,-5.5 -2,0 -7,5.5 -7,2.5 -16,2.5" transform="rotate(45)" fill="#072f61"/>
      <polygon points="-16,-2.5 -7,-2.5 -7,-5.5 -2,0 -7,5.5 -7,2.5 -16,2.5" transform="rotate(225)" fill="#072f61"/>
      <!-- Outward pointing arrows -->
      <polygon points="2,-2.5 11,-2.5 11,-5.5 16,0 11,5.5 11,2.5 2,2.5" transform="rotate(-45)" fill="#072f61"/>
      <polygon points="2,-2.5 11,-2.5 11,-5.5 16,0 11,5.5 11,2.5 2,2.5" transform="rotate(135)" fill="#072f61"/>
    </g>
    <circle cx="-16" cy="10.5" r="2.2" fill="#49ca50" stroke="#07315f" stroke-width="1"/>
    <circle cx="-8" cy="13" r="2.2" fill="#49ca50" stroke="#07315f" stroke-width="1"/>
    <circle cx="0" cy="13.5" r="2.2" fill="#49ca50" stroke="#07315f" stroke-width="1"/>
  </g>
</svg>

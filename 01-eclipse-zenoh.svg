<svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="1400" height="800" fill="white"/>
  
  <!-- ==================== HOME 1 (Left) ==================== -->
  <!-- Home 1 label -->
  <text x="150" y="50" font-size="16" font-weight="bold" fill="#1a2c52">Home 1</text>
  
  <!-- Internal connections in Home 1 (each-to-each) -->
  <line x1="80" y1="120" x2="140" y2="180" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="80" y1="120" x2="140" y2="240" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="140" y1="180" x2="140" y2="240" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="80" y1="120" x2="200" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="140" y1="180" x2="200" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="140" y1="240" x2="200" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  
  <!-- Server (Home 1) -->
  <g>
    <rect x="60" y="100" width="25" height="25" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="65" y="105" width="15" height="12" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <circle cx="73" cy="120" r="2" fill="#1a2c52"/>
    <text x="73" y="145" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">home1/server</text>
  </g>
  
  <!-- Sensor 1 (Home 1) -->
  <g>
    <circle cx="140" cy="180" r="7" fill="#FF6B6B" stroke="#1a2c52" stroke-width="2"/>
    <rect x="137" y="190" width="6" height="12" fill="#FF6B6B" stroke="#1a2c52" stroke-width="1.5" rx="1"/>
    <text x="140" y="215" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">home1/temp</text>
  </g>
  
  <!-- Sensor 2 (Home 1) -->
  <g>
    <circle cx="140" cy="240" r="7" fill="#FF6B6B" stroke="#1a2c52" stroke-width="2"/>
    <rect x="137" y="250" width="6" height="12" fill="#FF6B6B" stroke="#1a2c52" stroke-width="1.5" rx="1"/>
    <text x="140" y="275" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">home1/humidity</text>
  </g>
  
  <!-- Robot (Home 1) - cute caterpillar Wally style -->
  <g>
    <!-- Body segments -->
    <circle cx="175" cy="205" r="5" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="190" cy="205" r="5" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="205" cy="205" r="5" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Head -->
    <circle cx="165" cy="190" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="161" cy="187" r="1.5" fill="#1a2c52"/>
    <circle cx="169" cy="187" r="1.5" fill="#1a2c52"/>
    <!-- Camera on head -->
    <circle cx="165" cy="194" r="2.5" fill="#333" stroke="#1a2c52" stroke-width="1"/>
    <!-- Manipulator arm -->
    <line x1="172" y1="203" x2="190" y2="193" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="190" cy="193" r="2" fill="#FF8C00" stroke="#1a2c52" stroke-width="1"/>
    <!-- Caterpillar tracks -->
    <ellipse cx="185" cy="220" rx="25" ry="4" fill="none" stroke="#1a2c52" stroke-width="1.5"/>
    <text x="185" y="245" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">home1/robot</text>
  </g>
  
  <!-- ==================== HOME 2 (Center-Left) ==================== -->
  <!-- Home 2 label -->
  <text x="380" y="50" font-size="16" font-weight="bold" fill="#1a2c52">Home 2</text>
  
  <!-- Internal connections in Home 2 (each-to-each) -->
  <line x1="310" y1="120" x2="370" y2="180" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="310" y1="120" x2="370" y2="240" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="370" y1="180" x2="370" y2="240" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="310" y1="120" x2="430" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="370" y1="180" x2="430" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="370" y1="240" x2="430" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  
  <!-- Server (Home 2) -->
  <g>
    <rect x="290" y="100" width="25" height="25" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="295" y="105" width="15" height="12" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <circle cx="303" cy="120" r="2" fill="#1a2c52"/>
    <text x="303" y="145" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">home2/server</text>
  </g>
  
  <!-- Sensor 1 (Home 2) -->
  <g>
    <circle cx="370" cy="180" r="7" fill="#FF6B6B" stroke="#1a2c52" stroke-width="2"/>
    <rect x="367" y="190" width="6" height="12" fill="#FF6B6B" stroke="#1a2c52" stroke-width="1.5" rx="1"/>
    <text x="370" y="215" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">home2/temp</text>
  </g>
  
  <!-- Sensor 2 (Home 2) -->
  <g>
    <circle cx="370" cy="240" r="7" fill="#FF6B6B" stroke="#1a2c52" stroke-width="2"/>
    <rect x="367" y="250" width="6" height="12" fill="#FF6B6B" stroke="#1a2c52" stroke-width="1.5" rx="1"/>
    <text x="370" y="275" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">home2/motion</text>
  </g>
  
  <!-- Robot (Home 2) -->
  <g>
    <!-- Body segments -->
    <circle cx="405" cy="205" r="5" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="420" cy="205" r="5" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="435" cy="205" r="5" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Head -->
    <circle cx="395" cy="190" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="391" cy="187" r="1.5" fill="#1a2c52"/>
    <circle cx="399" cy="187" r="1.5" fill="#1a2c52"/>
    <!-- Camera on head -->
    <circle cx="395" cy="194" r="2.5" fill="#333" stroke="#1a2c52" stroke-width="1"/>
    <!-- Manipulator arm -->
    <line x1="402" y1="203" x2="420" y2="193" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="420" cy="193" r="2" fill="#FF8C00" stroke="#1a2c52" stroke-width="1"/>
    <!-- Caterpillar tracks -->
    <ellipse cx="415" cy="220" rx="25" ry="4" fill="none" stroke="#1a2c52" stroke-width="1.5"/>
    <text x="415" y="245" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">home2/robot</text>
  </g>
  
  <!-- ==================== CLOUD (Center-Right, upper) ==================== -->
  <!-- Cloud label -->
  <text x="750" y="50" font-size="16" font-weight="bold" fill="#1a2c52">Cloud</text>
  
  <!-- Cloud frame -->
  <rect x="650" y="80" width="250" height="200" rx="10" fill="none" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Internal connections in Cloud (each-to-each for servers) -->
  <line x1="700" y1="120" x2="800" y2="120" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="700" y1="120" x2="700" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="800" y1="120" x2="800" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="700" y1="200" x2="800" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="700" y1="120" x2="800" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="800" y1="120" x2="700" y2="200" stroke="#d0d0d0" stroke-width="1.5"/>
  <!-- Servers to storage -->
  <line x1="700" y1="160" x2="880" y2="160" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="800" y1="160" x2="880" y2="160" stroke="#d0d0d0" stroke-width="1.5"/>
  
  <!-- Server 1 (Cloud) -->
  <g>
    <rect x="680" y="105" width="25" height="25" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="685" y="110" width="15" height="12" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <circle cx="693" cy="125" r="2" fill="#1a2c52"/>
    <text x="693" y="150" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">cloud/server1</text>
  </g>
  
  <!-- Server 2 (Cloud) -->
  <g>
    <rect x="780" y="105" width="25" height="25" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="785" y="110" width="15" height="12" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <circle cx="793" cy="125" r="2" fill="#1a2c52"/>
    <text x="793" y="150" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">cloud/server2</text>
  </g>
  
  <!-- Storage 1 (Cloud) -->
  <g>
    <rect x="860" y="135" width="22" height="6" rx="1" fill="#FFD700" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="860" y="142" width="22" height="6" rx="1" fill="#FFC700" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="860" y="149" width="22" height="6" rx="1" fill="#FFB700" stroke="#1a2c52" stroke-width="1.5"/>
    <text x="871" y="175" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">cloud/storage</text>
  </g>
  
  <!-- Camera 1 (Cloud) -->
  <g>
    <rect x="700" y="185" width="25" height="18" rx="2" fill="#9370DB" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="716" cy="194" r="5" fill="white" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="716" cy="194" r="2.5" fill="#1a2c52"/>
    <text x="713" y="220" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">cloud/cam1</text>
  </g>
  
  <!-- Camera 2 (Cloud) -->
  <g>
    <rect x="800" y="185" width="25" height="18" rx="2" fill="#9370DB" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="816" cy="194" r="5" fill="white" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="816" cy="194" r="2.5" fill="#1a2c52"/>
    <text x="813" y="220" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">cloud/cam2</text>
  </g>
  
  <!-- ==================== WORKSTATIONS (Right, lower) ==================== -->
  <!-- Workstations label -->
  <text x="1050" y="50" font-size="16" font-weight="bold" fill="#1a2c52">Workstations</text>
  
  <!-- Workstation 1 -->
  <g>
    <rect x="980" y="100" width="28" height="22" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="985" y="105" width="18" height="12" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <!-- Stand -->
    <rect x="998" y="122" width="2" height="8" fill="#87CEEB" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="990" y="130" width="18" height="4" fill="#87CEEB" stroke="#1a2c52" stroke-width="1.5" rx="1"/>
    <text x="994" y="155" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">ws/desk1</text>
  </g>
  
  <!-- Workstation 2 -->
  <g>
    <rect x="1060" y="100" width="28" height="22" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="1065" y="105" width="18" height="12" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <!-- Stand -->
    <rect x="1078" y="122" width="2" height="8" fill="#87CEEB" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="1070" y="130" width="18" height="4" fill="#87CEEB" stroke="#1a2c52" stroke-width="1.5" rx="1"/>
    <text x="1074" y="155" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">ws/desk2</text>
  </g>
  
  <!-- Workstation 3 -->
  <g>
    <rect x="1140" y="100" width="28" height="22" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="1145" y="105" width="18" height="12" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <!-- Stand -->
    <rect x="1158" y="122" width="2" height="8" fill="#87CEEB" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="1150" y="130" width="18" height="4" fill="#87CEEB" stroke="#1a2c52" stroke-width="1.5" rx="1"/>
    <text x="1154" y="155" font-size="9" font-weight="bold" fill="#FF8C00" text-anchor="middle">ws/desk3</text>
  </g>
  
  <!-- ==================== INTER-CLUSTER CONNECTIONS (servers only, dashed) ==================== -->
  <!-- Home1 server to Cloud servers -->
  <line x1="80" y1="113" x2="700" y2="120" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Home2 server to Cloud servers -->
  <line x1="310" y1="113" x2="800" y2="120" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Cloud servers to Workstations -->
  <line x1="700" y1="145" x2="994" y2="145" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="800" y1="145" x2="1074" y2="145" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="800" y1="145" x2="1154" y2="145" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Legend -->
  <text x="700" y="700" font-size="12" font-weight="bold" fill="#1a2c52">Zenoh Clustered Mesh Network</text>
  <text x="700" y="720" font-size="10" fill="#666">Solid lines: intra-cluster (each-to-each) | Dashed lines: inter-cluster (servers only)</text>
  <text x="700" y="740" font-size="10" fill="#666">Node types: Servers, Robots, Sensors, Storage, Cameras, Workstations</text>
</svg>

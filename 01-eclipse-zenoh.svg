<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="1000" height="600" fill="white"/>
  
  <!-- Connection lines (light gray) -->
  <line x1="150" y1="150" x2="350" y2="250" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="350" y1="250" x2="500" y2="150" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="500" y1="150" x2="650" y2="250" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="650" y1="250" x2="850" y2="150" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="150" y1="150" x2="500" y2="400" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="500" y1="400" x2="850" y2="150" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="350" y1="250" x2="650" y2="450" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="650" y1="250" x2="350" y2="450" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="150" y1="150" x2="650" y2="450" stroke="#d0d0d0" stroke-width="2"/>
  <line x1="650" y1="450" x2="850" y2="400" stroke="#d0d0d0" stroke-width="2"/>
  
  <!-- Node 1: Computer (top left) -->
  <g>
    <rect x="100" y="100" width="100" height="80" rx="4" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <rect x="110" y="110" width="80" height="50" fill="white" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="150" cy="170" r="5" fill="#1a2c52"/>
    <text x="150" y="210" font-size="13" font-weight="bold" fill="#FF8C00" text-anchor="middle">Computer</text>
  </g>
  
  <!-- Node 2: Sensor (top center-left) -->
  <g>
    <circle cx="500" cy="150" r="50" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <circle cx="500" cy="150" r="35" fill="none" stroke="#FF8C00" stroke-width="2"/>
    <line x1="500" y1="115" x2="500" y2="95" stroke="#FF8C00" stroke-width="2"/>
    <line x1="530" y1="130" x2="545" y2="115" stroke="#FF8C00" stroke-width="2"/>
    <text x="500" y="220" font-size="13" font-weight="bold" fill="#FF8C00" text-anchor="middle">sensor/room1</text>
    <text x="500" y="237" font-size="11" fill="#999999" text-anchor="middle">/temperature</text>
  </g>
  
  <!-- Node 3: Robot (top right) -->
  <g>
    <!-- Body -->
    <rect x="800" y="110" width="100" height="80" rx="5" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <!-- Head -->
    <circle cx="850" cy="105" r="20" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <!-- Eyes -->
    <circle cx="840" cy="100" r="4" fill="#1a2c52"/>
    <circle cx="860" cy="100" r="4" fill="#1a2c52"/>
    <!-- Smile -->
    <path d="M 840 108 Q 850 112 860 108" stroke="#1a2c52" stroke-width="2" fill="none"/>
    <text x="850" y="230" font-size="13" font-weight="bold" fill="#FF8C00" text-anchor="middle">robot/joe</text>
    <text x="850" y="247" font-size="11" fill="#999999" text-anchor="middle">/position</text>
  </g>
  
  <!-- Node 4: Storage (middle left) -->
  <g>
    <rect x="300" y="200" width="100" height="100" rx="4" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <line x1="310" y1="240" x2="390" y2="240" stroke="#1a2c52" stroke-width="2"/>
    <line x1="310" y1="260" x2="390" y2="260" stroke="#1a2c52" stroke-width="2"/>
    <line x1="310" y1="280" x2="390" y2="280" stroke="#1a2c52" stroke-width="2"/>
    <text x="350" y="340" font-size="13" font-weight="bold" fill="#FF8C00" text-anchor="middle">Storage</text>
  </g>
  
  <!-- Node 5: Workstation (middle right) -->
  <g>
    <!-- Monitor -->
    <rect x="600" y="200" width="100" height="70" rx="3" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <rect x="610" y="210" width="80" height="50" fill="white" stroke="#1a2c52" stroke-width="2"/>
    <!-- Stand -->
    <rect x="645" y="270" width="10" height="20" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <rect x="630" y="290" width="40" height="8" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <text x="650" y="340" font-size="13" font-weight="bold" fill="#FF8C00" text-anchor="middle">Workstation</text>
  </g>
  
  <!-- Node 6: Sensor (bottom center) -->
  <g>
    <circle cx="500" cy="400" r="50" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <circle cx="500" cy="400" r="35" fill="none" stroke="#FF8C00" stroke-width="2"/>
    <line x1="500" y1="365" x2="500" y2="345" stroke="#FF8C00" stroke-width="2"/>
    <line x1="530" y1="380" x2="545" y2="365" stroke="#FF8C00" stroke-width="2"/>
    <line x1="470" y1="380" x2="455" y2="365" stroke="#FF8C00" stroke-width="2"/>
    <text x="500" y="480" font-size="13" font-weight="bold" fill="#FF8C00" text-anchor="middle">sensor/room2</text>
    <text x="500" y="497" font-size="11" fill="#999999" text-anchor="middle">/humidity</text>
  </g>
  
  <!-- Node 7: Robot (bottom left) -->
  <g>
    <!-- Body -->
    <rect x="300" y="380" width="100" height="80" rx="5" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <!-- Head -->
    <circle cx="350" cy="375" r="20" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <!-- Eyes -->
    <circle cx="340" cy="370" r="4" fill="#1a2c52"/>
    <circle cx="360" cy="370" r="4" fill="#1a2c52"/>
    <!-- Smile -->
    <path d="M 340 378 Q 350 382 360 378" stroke="#1a2c52" stroke-width="2" fill="none"/>
    <text x="350" y="505" font-size="13" font-weight="bold" fill="#FF8C00" text-anchor="middle">robot/max</text>
    <text x="350" y="522" font-size="11" fill="#999999" text-anchor="middle">/status</text>
  </g>
  
  <!-- Node 8: Sensor (bottom right) -->
  <g>
    <circle cx="800" cy="400" r="50" fill="#87CEEB" stroke="#1a2c52" stroke-width="3"/>
    <circle cx="800" cy="400" r="35" fill="none" stroke="#FF8C00" stroke-width="2"/>
    <line x1="800" y1="365" x2="800" y2="345" stroke="#FF8C00" stroke-width="2"/>
    <line x1="770" y1="380" x2="755" y2="365" stroke="#FF8C00" stroke-width="2"/>
    <text x="800" y="485" font-size="13" font-weight="bold" fill="#FF8C00" text-anchor="middle">sensor/room1</text>
    <text x="800" y="502" font-size="11" fill="#999999" text-anchor="middle">/motion</text>
  </g>
</svg>

<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="1200" height="700" fill="white"/>
  
  <!-- ==================== CLUSTER 1 (Left Group: room1) ==================== -->
  <!-- Internal connections in cluster 1 (each-to-each light gray lines) -->
  <line x1="120" y1="150" x2="180" y2="150" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="120" y1="150" x2="150" y2="220" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="180" y1="150" x2="150" y2="220" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="120" y1="150" x2="100" y2="280" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="180" y1="150" x2="200" y2="280" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="150" y1="220" x2="100" y2="280" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="150" y1="220" x2="200" y2="280" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="100" y1="280" x2="200" y2="280" stroke="#d0d0d0" stroke-width="1.5"/>
  
  <!-- Server node 1 (computer system box) -->
  <g>
    <rect x="105" y="125" width="30" height="30" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="110" y="130" width="20" height="15" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <circle cx="120" cy="150" r="2.5" fill="#1a2c52"/>
    <text x="120" y="175" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">server/room1</text>
  </g>
  
  <!-- Sensor node 1 (thermometer) -->
  <g>
    <circle cx="180" cy="150" r="8" fill="#FF6B6B" stroke="#1a2c52" stroke-width="2"/>
    <rect x="176" y="160" width="8" height="15" fill="#FF6B6B" stroke="#1a2c52" stroke-width="1.5" rx="2"/>
    <text x="180" y="190" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">sensor/room1/temp</text>
  </g>
  
  <!-- Camera node 1 -->
  <g>
    <rect x="135" y="205" width="30" height="20" rx="2" fill="#9370DB" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="157" cy="215" r="6" fill="white" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="157" cy="215" r="3" fill="#1a2c52"/>
    <text x="150" y="240" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">camera/room1</text>
  </g>
  
  <!-- Storage node 1 (pile of disks) -->
  <g>
    <rect x="85" y="270" width="30" height="8" rx="2" fill="#FFD700" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="85" y="279" width="30" height="8" rx="2" fill="#FFC700" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="85" y="288" width="30" height="8" rx="2" fill="#FFB700" stroke="#1a2c52" stroke-width="1.5"/>
    <text x="100" y="320" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">storage/room1</text>
  </g>
  
  <!-- Robot node 1 (cute caterpillar with camera and manipulator) -->
  <g>
    <!-- Body segments -->
    <circle cx="180" cy="285" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="195" cy="285" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="210" cy="285" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Head -->
    <circle cx="175" cy="270" r="7" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="171" cy="268" r="1.5" fill="#1a2c52"/>
    <circle cx="179" cy="268" r="1.5" fill="#1a2c52"/>
    <!-- Camera on head -->
    <circle cx="175" cy="275" r="3" fill="#333" stroke="#1a2c52" stroke-width="1"/>
    <!-- Manipulator arm -->
    <line x1="186" y1="283" x2="200" y2="275" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="200" cy="275" r="2.5" fill="#FF8C00" stroke="#1a2c52" stroke-width="1"/>
    <!-- Caterpillar tracks -->
    <rect x="165" y="295" width="55" height="6" rx="3" fill="none" stroke="#1a2c52" stroke-width="1.5"/>
    <text x="197" y="330" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">robot/room1</text>
  </g>
  
  <!-- ==================== CLUSTER 2 (Middle Group: room2) ==================== -->
  <!-- Internal connections in cluster 2 (each-to-each) -->
  <line x1="420" y1="160" x2="480" y2="160" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="420" y1="160" x2="450" y2="230" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="480" y1="160" x2="450" y2="230" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="420" y1="160" x2="400" y2="300" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="480" y1="160" x2="500" y2="300" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="450" y1="230" x2="400" y2="300" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="450" y1="230" x2="500" y2="300" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="400" y1="300" x2="500" y2="300" stroke="#d0d0d0" stroke-width="1.5"/>
  
  <!-- Server node 2 -->
  <g>
    <rect x="405" y="135" width="30" height="30" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="410" y="140" width="20" height="15" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <circle cx="420" cy="160" r="2.5" fill="#1a2c52"/>
    <text x="420" y="185" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">server/room2</text>
  </g>
  
  <!-- Sensor node 2 (thermometer) -->
  <g>
    <circle cx="480" cy="160" r="8" fill="#FF6B6B" stroke="#1a2c52" stroke-width="2"/>
    <rect x="476" y="170" width="8" height="15" fill="#FF6B6B" stroke="#1a2c52" stroke-width="1.5" rx="2"/>
    <text x="480" y="200" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">sensor/room2/humid</text>
  </g>
  
  <!-- Camera node 2 -->
  <g>
    <rect x="435" y="215" width="30" height="20" rx="2" fill="#9370DB" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="457" cy="225" r="6" fill="white" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="457" cy="225" r="3" fill="#1a2c52"/>
    <text x="450" y="250" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">camera/room2</text>
  </g>
  
  <!-- Storage node 2 (pile of disks) -->
  <g>
    <rect x="385" y="290" width="30" height="8" rx="2" fill="#FFD700" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="385" y="299" width="30" height="8" rx="2" fill="#FFC700" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="385" y="308" width="30" height="8" rx="2" fill="#FFB700" stroke="#1a2c52" stroke-width="1.5"/>
    <text x="400" y="340" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">storage/room2</text>
  </g>
  
  <!-- Robot node 2 (cute caterpillar) -->
  <g>
    <!-- Body segments -->
    <circle cx="480" cy="305" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="495" cy="305" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="510" cy="305" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Head -->
    <circle cx="475" cy="290" r="7" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="471" cy="288" r="1.5" fill="#1a2c52"/>
    <circle cx="479" cy="288" r="1.5" fill="#1a2c52"/>
    <!-- Camera on head -->
    <circle cx="475" cy="295" r="3" fill="#333" stroke="#1a2c52" stroke-width="1"/>
    <!-- Manipulator arm -->
    <line x1="486" y1="303" x2="500" y2="295" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="500" cy="295" r="2.5" fill="#FF8C00" stroke="#1a2c52" stroke-width="1"/>
    <!-- Caterpillar tracks -->
    <rect x="465" y="315" width="55" height="6" rx="3" fill="none" stroke="#1a2c52" stroke-width="1.5"/>
    <text x="497" y="360" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">robot/room2</text>
  </g>
  
  <!-- ==================== CLUSTER 3 (Right Group: outdoor) ==================== -->
  <!-- Internal connections in cluster 3 (each-to-each) -->
  <line x1="750" y1="180" x2="810" y2="180" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="750" y1="180" x2="780" y2="270" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="810" y1="180" x2="780" y2="270" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="750" y1="180" x2="730" y2="330" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="810" y1="180" x2="830" y2="330" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="780" y1="270" x2="730" y2="330" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="780" y1="270" x2="830" y2="330" stroke="#d0d0d0" stroke-width="1.5"/>
  <line x1="730" y1="330" x2="830" y2="330" stroke="#d0d0d0" stroke-width="1.5"/>
  
  <!-- Server node 3 -->
  <g>
    <rect x="735" y="155" width="30" height="30" rx="2" fill="#87CEEB" stroke="#1a2c52" stroke-width="2"/>
    <rect x="740" y="160" width="20" height="15" fill="white" stroke="#1a2c52" stroke-width="1"/>
    <circle cx="750" cy="180" r="2.5" fill="#1a2c52"/>
    <text x="750" y="205" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">server/outdoor</text>
  </g>
  
  <!-- Sensor node 3 (thermometer) -->
  <g>
    <circle cx="810" cy="180" r="8" fill="#FF6B6B" stroke="#1a2c52" stroke-width="2"/>
    <rect x="806" y="190" width="8" height="15" fill="#FF6B6B" stroke="#1a2c52" stroke-width="1.5" rx="2"/>
    <text x="810" y="220" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">sensor/outdoor/temp</text>
  </g>
  
  <!-- Camera node 3 -->
  <g>
    <rect x="765" y="255" width="30" height="20" rx="2" fill="#9370DB" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="787" cy="265" r="6" fill="white" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="787" cy="265" r="3" fill="#1a2c52"/>
    <text x="780" y="290" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">camera/outdoor</text>
  </g>
  
  <!-- Storage node 3 (pile of disks) -->
  <g>
    <rect x="715" y="320" width="30" height="8" rx="2" fill="#FFD700" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="715" y="329" width="30" height="8" rx="2" fill="#FFC700" stroke="#1a2c52" stroke-width="1.5"/>
    <rect x="715" y="338" width="30" height="8" rx="2" fill="#FFB700" stroke="#1a2c52" stroke-width="1.5"/>
    <text x="730" y="370" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">storage/outdoor</text>
  </g>
  
  <!-- Robot node 3 (cute caterpillar) -->
  <g>
    <!-- Body segments -->
    <circle cx="810" cy="335" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="825" cy="335" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <circle cx="840" cy="335" r="6" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Head -->
    <circle cx="805" cy="320" r="7" fill="#90EE90" stroke="#1a2c52" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="801" cy="318" r="1.5" fill="#1a2c52"/>
    <circle cx="809" cy="318" r="1.5" fill="#1a2c52"/>
    <!-- Camera on head -->
    <circle cx="805" cy="325" r="3" fill="#333" stroke="#1a2c52" stroke-width="1"/>
    <!-- Manipulator arm -->
    <line x1="816" y1="333" x2="830" y2="325" stroke="#1a2c52" stroke-width="1.5"/>
    <circle cx="830" cy="325" r="2.5" fill="#FF8C00" stroke="#1a2c52" stroke-width="1"/>
    <!-- Caterpillar tracks -->
    <rect x="795" y="345" width="55" height="6" rx="3" fill="none" stroke="#1a2c52" stroke-width="1.5"/>
    <text x="827" y="390" font-size="10" font-weight="bold" fill="#FF8C00" text-anchor="middle">robot/outdoor</text>
  </g>
  
  <!-- ==================== INTER-CLUSTER CONNECTIONS (servers only) ==================== -->
  <line x1="135" y1="150" x2="405" y2="160" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="405" y1="160" x2="735" y2="180" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="135" y1="150" x2="735" y2="180" stroke="#d0d0d0" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Legend/Title -->
  <text x="600" y="500" font-size="14" font-weight="bold" fill="#1a2c52">Zenoh Mesh Network - Three Clustered Node Groups</text>
  <text x="600" y="520" font-size="11" fill="#666" text-anchor="middle">Solid lines: intra-cluster connections (each-to-each) | Dashed lines: inter-cluster connections (servers only)</text>
</svg>


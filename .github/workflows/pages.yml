name: Deploy presentation to Pages

on:
  push:
    branches: [main]
    paths:
      - presentation/**
      - assets/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build Marp deck
        run: |
          mkdir -p _site/presentation
          cp -r assets _site/assets
          npx --yes @marp-team/marp-cli@4.4.0 presentation/zenoh.md \
            -o _site/presentation/index.html
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./presentation/">
          <link rel="canonical" href="./presentation/">
          <title>Eclipse Zenoh presentation</title>
          <a href="./presentation/">Eclipse Zenoh presentation</a>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -22 60 44" role="img" aria-labelledby="sample-title sample-desc">
  <title id="sample-title">Sample card</title>
  <desc id="sample-desc">A reusable card glyph standing for one Zenoh Sample (a reply value), tagged with the timestamp of the value it carries.</desc>
  <g id="sample">
    <rect x="-23" y="-15" width="46" height="30" rx="7" fill="#ffffff" stroke="#0b3a82" stroke-width="2"/>
    <circle cx="-12" cy="0" r="5.5" fill="#f5aa00"/>
    <text x="7" y="5" text-anchor="middle" font="700 14px Arial, sans-serif" fill="#0b3a82">t2</text>
  </g>
</svg>
